name: Fader
options:
  bundleIdPrefix: com.mattwesdock
  deploymentTarget:
    macOS: "14.2"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: 6.0
    MACOSX_DEPLOYMENT_TARGET: "14.2"
    ENABLE_HARDENED_RUNTIME: YES
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: ""

targets:
  Fader:
    type: application
    platform: macOS
    deploymentTarget: "14.2"
    dependencies:
      - sdk: Accelerate.framework
      - sdk: CoreAudio.framework
      - sdk: AudioToolbox.framework
      - sdk: ServiceManagement.framework
    sources:
      - path: Fader
        excludes:
          - "**/.DS_Store"
    info:
      path: Fader/Info.plist
      properties:
        CFBundleName: Fader
        CFBundleDisplayName: Fader
        CFBundleIdentifier: com.mattwesdock.Fader
        CFBundleVersion: "1"
        CFBundleShortVersionString: "0.1.0"
        NSPrincipalClass: NSApplication
        LSUIElement: true
        NSMicrophoneUsageDescription: "Fader needs access to system audio to control per-app volume."
        NSAudioCaptureUsageDescription: "Fader needs access to system audio to control per-app volume."
        NSHighResolutionCapable: true
        LSApplicationCategoryType: public.app-category.music
    entitlements:
      path: Fader/Fader.entitlements
      properties:
        com.apple.security.app-sandbox: false
        com.apple.security.cs.allow-unsigned-executable-memory: false
        com.apple.security.cs.disable-library-validation: false
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.mattwesdock.Fader
        INFOPLIST_FILE: Fader/Info.plist
        CODE_SIGN_ENTITLEMENTS: Fader/Fader.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CURRENT_PROJECT_VERSION: 1
        MARKETING_VERSION: 0.1.0
        SWIFT_EMIT_LOC_STRINGS: YES
